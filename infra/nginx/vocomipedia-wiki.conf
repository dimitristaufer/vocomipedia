map $http_user_agent $vocomipedia_ai_crawler {
    default "";
    ~*(GPTBot|ClaudeBot|anthropic-ai|CCBot|PerplexityBot|Bytespider|Amazonbot) $binary_remote_addr;
}
limit_req_zone $vocomipedia_ai_crawler zone=vocomipedia_ai_crawlers:10m rate=1r/s;

server {
    server_name vocomipedia.com www.vocomipedia.com;

    access_log /var/log/nginx/vocomipedia.access.log;
    error_log /var/log/nginx/vocomipedia.error.log warn;
    client_max_body_size 32m;

    location = /robots.txt {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'User-agent: GPTBot\nDisallow: /\n\nUser-agent: ClaudeBot\nDisallow: /\n\nUser-agent: anthropic-ai\nDisallow: /\n\nUser-agent: CCBot\nDisallow: /\n\nUser-agent: PerplexityBot\nDisallow: /\n\nUser-agent: Bytespider\nDisallow: /\n\nUser-agent: Amazonbot\nDisallow: /\n\nUser-agent: *\nDisallow: /api.php\nDisallow: /index.php/Special:\nDisallow: /index.php?\nCrawl-delay: 10\n';
    }

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok\n';
    }

    location / {
        limit_req zone=vocomipedia_ai_crawlers burst=10 nodelay;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/vocomipedia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vocomipedia.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    listen [::]:80;
    server_name vocomipedia.com www.vocomipedia.com;

    if ($host = vocomipedia.com) {
        return 301 https://$host$request_uri;
    }

    if ($host = www.vocomipedia.com) {
        return 301 https://$host$request_uri;
    }

    return 404;
}
