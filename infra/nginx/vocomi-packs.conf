limit_conn_zone $binary_remote_addr zone=vocomi_pack_addr:10m;

map $arg_include_data $vocomi_pack_catalog {
    default /packs-images.json;
    1 /packs.json;
    true /packs.json;
}

server {
    server_name packs.vocomipedia.com _;

    access_log /var/log/nginx/vocomi-packs.access.log;
    error_log /var/log/nginx/vocomi-packs.error.log warn;

    root /srv/vocomi-packs/current;
    autoindex off;
    sendfile on;
    tcp_nopush on;
    etag on;
    if_modified_since exact;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok\n';
    }

    location = /packs.json {
        add_header X-Content-Type-Options nosniff always;
        add_header Cache-Control 'public, max-age=60' always;
        try_files /packs.json =404;
    }

    location = /packs-images.json {
        add_header X-Content-Type-Options nosniff always;
        add_header Cache-Control 'public, max-age=60' always;
        try_files /packs-images.json =404;
    }

    location = /api/packs/list {
        add_header X-Content-Type-Options nosniff always;
        add_header Cache-Control 'public, max-age=60' always;
        try_files $vocomi_pack_catalog =404;
    }

    location = /api/packs/sas {
        if ($arg_name !~ ^[A-Za-z0-9._-]+\.vpack$) {
            return 400 '{"error":"Bad file name"}';
        }
        add_header Content-Type application/json always;
        add_header X-Content-Type-Options nosniff always;
        add_header Cache-Control 'no-store' always;
        return 200 '{"url":"https://packs.vocomipedia.com/$arg_name","expires_utc":"2099-12-31T23:59:59Z"}';
    }

    location = /api/ {
        if ($arg_action = download) {
            return 302 https://packs.vocomipedia.com/$arg_name;
        }
        add_header X-Content-Type-Options nosniff always;
        add_header Cache-Control 'public, max-age=60' always;
        try_files $vocomi_pack_catalog =404;
    }

    location = /api {
        if ($arg_action = download) {
            return 302 https://packs.vocomipedia.com/$arg_name;
        }
        add_header X-Content-Type-Options nosniff always;
        add_header Cache-Control 'public, max-age=60' always;
        try_files $vocomi_pack_catalog =404;
    }

    location / {
        limit_conn vocomi_pack_addr 4;
        limit_rate_after 5m;
        limit_rate 25m;
        add_header Accept-Ranges bytes always;
        add_header X-Content-Type-Options nosniff always;
        add_header Cache-Control 'public, max-age=604800' always;
        try_files $uri =404;
    }

    listen 443 ssl;
    listen [::]:443 ssl ipv6only=on;
    ssl_certificate /etc/letsencrypt/live/packs.vocomipedia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/packs.vocomipedia.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name packs.vocomipedia.com _;

    if ($host = packs.vocomipedia.com) {
        return 301 https://$host$request_uri;
    }

    return 404;
}
