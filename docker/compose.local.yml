services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${MW_DB_NAME:-mediawiki}
      MARIADB_USER: ${MW_DB_USER:-mediawiki}
      MARIADB_PASSWORD: ${MW_DB_PASSWORD:-mediawiki_pass}
      MARIADB_ROOT_PASSWORD: ${MW_DB_ROOT_PASSWORD:-mediawiki_root_pass}
    volumes:
      - mw-db:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u root -p$${MARIADB_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 30

  mediawiki:
    build:
      context: .
      dockerfile: mediawiki/Dockerfile
    image: vocomipedia-mediawiki:1.43-moderation
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_started
    ports:
      - "${MW_PORT:-8080}:80"
    volumes:
      - mw-images:/var/www/html/images
      - ./assets/vocomi-logo-135.png:/var/www/html/resources/assets/vocomi-logo-135.png:ro
      - ./local/LocalSettings.php:/var/www/html/LocalSettings.php:ro

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.10.2
    platform: linux/amd64
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - mw-elasticsearch:/usr/share/elasticsearch/data

volumes:
  mw-db:
  mw-images:
  mw-elasticsearch:
