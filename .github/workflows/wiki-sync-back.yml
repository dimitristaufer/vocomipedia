name: Wiki Sync Back

on:
  workflow_dispatch:
    inputs:
      deck_codes:
        description: "Space-separated deck codes to pull, e.g. ja_n5 de_a2"
        required: true
        default: "ja_n5"
      export_source:
        description: "Write accepted changes back into Vocomipedia canonical data"
        type: boolean
        required: false
        default: true
      create_pr:
        description: "Create a PR in this repo when canonical data changes"
        type: boolean
        required: false
        default: true

jobs:
  sync-back:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Vocomipedia
        uses: actions/checkout@v4
        with:
          path: vocomipedia
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: vocomipedia/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r vocomipedia/requirements.txt
      - name: Pull approved wiki edits and export source changes
        env:
          MEDIAWIKI_API_URL: ${{ secrets.MEDIAWIKI_API_URL }}
        run: |
          test -n "$MEDIAWIKI_API_URL"
          EXPORT_ARG=""
          if [ "${{ inputs.export_source }}" = "true" ]; then
            EXPORT_ARG="--export-source"
          fi
          cd vocomipedia
          python tools/wiki_sync_back.py \
            --decks ${{ inputs.deck_codes }} \
            --api-url "$MEDIAWIKI_API_URL" \
            --work-root tmp/wiki-sync-back-data \
            --pulled-root tmp/wiki-pull \
            --reports-dir reports/wiki-sync-back \
            $EXPORT_ARG
      - name: Upload sync reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vocomipedia-wiki-sync-back
          path: |
            vocomipedia/reports/wiki-sync-back/**
          if-no-files-found: ignore
      - name: Detect Vocomipedia canonical changes
        id: diff
        run: |
          cd vocomipedia
          if git diff --quiet -- data/languages; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Create Vocomipedia PR
        if: inputs.create_pr && steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="vocomipedia/wiki-sync-${{ github.run_id }}"
          cd vocomipedia
          git config user.name "vocomipedia-bot"
          git config user.email "vocomipedia-bot@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add data/languages
          git commit -m "Sync approved Vocomipedia edits"
          git push origin "$BRANCH"
          gh pr create \
            --repo dimitristaufer/vocomipedia \
            --base main \
            --head "$BRANCH" \
            --title "Sync approved Vocomipedia edits" \
            --body-file reports/wiki-sync-back/summary.md
