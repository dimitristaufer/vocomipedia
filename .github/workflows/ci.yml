name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Validate tooling and tests
        run: python tools/ci_validate.py --skip-smoke-release
      - name: Upload validation backups
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vocomipedia-ci-backups
          path: reports/backups/*.tar.gz
          if-no-files-found: ignore
