name: Release And Deploy

on:
  workflow_dispatch:
    inputs:
      deck_codes:
        description: "Space-separated deck codes, e.g. zh_1 ja_n5 ja_n4"
        required: true
        default: "ja_n5"

jobs:
  release:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - name: Checkout Vocomipedia
        uses: actions/checkout@v4
        with:
          path: vocomipedia
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: vocomipedia/requirements-release.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r vocomipedia/requirements-release.txt
      - name: Prepare private key
        id: private-key
        env:
          VOCOMI_IOS_PRIVATE_PEM: ${{ secrets.VOCOMI_IOS_PRIVATE_PEM }}
        run: |
          test -n "$VOCOMI_IOS_PRIVATE_PEM"
          KEY_PATH="$RUNNER_TEMP/ios_private.pem"
          PUB_PATH="$RUNNER_TEMP/ios_public.pem"
          python - "$KEY_PATH" "$PUB_PATH" <<'PY'
          import base64
          import os
          import sys
          from pathlib import Path
          from cryptography.hazmat.primitives import serialization

          raw = os.environ["VOCOMI_IOS_PRIVATE_PEM"].strip()
          if "\\n" in raw and "\n" not in raw:
              raw = raw.replace("\\n", "\n")
          if not raw.startswith("-----BEGIN"):
              try:
                  raw = base64.b64decode(raw, validate=True).decode("utf-8").strip()
              except Exception:
                  pass
          pem = (raw + "\n").encode("utf-8")
          try:
              key = serialization.load_pem_private_key(pem, password=None)
          except Exception as exc:
              raise SystemExit(
                  "VOCOMI_IOS_PRIVATE_PEM is not a valid unencrypted PEM private key. "
                  "Paste the complete ios_private.pem contents, or base64-encode that file."
              ) from exc
          Path(sys.argv[1]).write_bytes(pem)
          Path(sys.argv[1]).chmod(0o600)
          Path(sys.argv[2]).write_bytes(
              key.public_key().public_bytes(
                  encoding=serialization.Encoding.PEM,
                  format=serialization.PublicFormat.SubjectPublicKeyInfo,
              )
          )
          PY
          chmod 600 "$KEY_PATH"
          echo "path=$KEY_PATH" >> "$GITHUB_OUTPUT"
          echo "public_path=$PUB_PATH" >> "$GITHUB_OUTPUT"
      - name: Resolve deck closure
        run: |
          cd vocomipedia
          SYNC_DECK_CODES="$(python tools/catalog_decks.py --decks ${{ inputs.deck_codes }} --with-combined-siblings)"
          echo "SYNC_DECK_CODES=$SYNC_DECK_CODES" >> "$GITHUB_ENV"
      - name: Resolve previous release base
        env:
          VPS_PACK_HOST: ${{ secrets.VPS_PACK_HOST }}
          VPS_PACK_PORT: ${{ secrets.VPS_PACK_PORT }}
          VPS_PACK_USER: ${{ secrets.VPS_PACK_USER }}
          VPS_PACK_SSH_KEY: ${{ secrets.VPS_PACK_SSH_KEY }}
          VPS_PACK_ROOT: ${{ secrets.VPS_PACK_ROOT }}
        run: |
          test -n "$VPS_PACK_HOST"
          test -n "$VPS_PACK_USER"
          test -n "$VPS_PACK_SSH_KEY"
          install -m 700 -d ~/.ssh
          python - ~/.ssh/vocomipedia_pack_deploy <<'PY'
          import base64
          import os
          import sys
          from pathlib import Path

          raw = os.environ["VPS_PACK_SSH_KEY"].strip()
          if "\\n" in raw and "\n" not in raw:
              raw = raw.replace("\\n", "\n")
          if not raw.startswith("-----BEGIN") and not raw.startswith("OPENSSH"):
              try:
                  raw = base64.b64decode(raw, validate=True).decode("utf-8").strip()
              except Exception:
                  pass
          Path(sys.argv[1]).write_text(raw + "\n", encoding="utf-8")
          Path(sys.argv[1]).chmod(0o600)
          PY
          chmod 600 ~/.ssh/vocomipedia_pack_deploy
          ssh-keygen -y -f ~/.ssh/vocomipedia_pack_deploy >/dev/null
          PORT="${VPS_PACK_PORT:-22}"
          ROOT="${VPS_PACK_ROOT:-/srv/vocomi-packs}"
          cd vocomipedia
          mkdir -p tmp/release-state
          ssh -i ~/.ssh/vocomipedia_pack_deploy -p "$PORT" -o BatchMode=yes -o StrictHostKeyChecking=accept-new \
            "$VPS_PACK_USER@$VPS_PACK_HOST" "cat '$ROOT/current/release-state.json' 2>/dev/null || true" \
            > tmp/release-state/previous.json
          BASE_SHA="$(python - <<'PY'
          import json
          from pathlib import Path

          path = Path("tmp/release-state/previous.json")
          try:
              data = json.loads(path.read_text(encoding="utf-8") or "{}")
          except json.JSONDecodeError:
              data = {}
          print(str(data.get("git_sha") or "").strip())
          PY
          )"
          if [ -n "$BASE_SHA" ] && git cat-file -e "$BASE_SHA^{commit}" 2>/dev/null; then
            echo "Using previous global deployed release fallback: $BASE_SHA"
          elif BASE_SHA="$(git rev-parse HEAD^ 2>/dev/null)"; then
            echo "Previous release base unavailable; falling back to HEAD^: $BASE_SHA"
          else
            BASE_SHA=""
            echo "No previous release base is available; changed-item detection will include all selected items."
          fi
          echo "RELEASE_BASE_SHA=$BASE_SHA" >> "$GITHUB_ENV"
      - name: Prepare selected canonical decks
        run: |
          cd vocomipedia
          python tools/prepare_release_workspace.py \
            --decks $SYNC_DECK_CODES \
            --out-root tmp/actions-data
      - name: Detect changed MediaWiki item pages
        run: |
          cd vocomipedia
          mkdir -p tmp/changed-items
          if [ -n "${RELEASE_BASE_SHA:-}" ]; then
            FALLBACK_ARGS=(--fallback-base "$RELEASE_BASE_SHA")
          else
            FALLBACK_ARGS=()
          fi
          if [ -s tmp/release-state/previous.json ]; then
            python tools/changed_deck_items.py \
              --decks ${{ inputs.deck_codes }} \
              --release-state-file tmp/release-state/previous.json \
              "${FALLBACK_ARGS[@]}" \
              --head HEAD \
              --out-dir tmp/changed-items
          elif [ -n "${RELEASE_BASE_SHA:-}" ]; then
            python tools/changed_deck_items.py \
              --decks ${{ inputs.deck_codes }} \
              --base "$RELEASE_BASE_SHA" \
              --head HEAD \
              --out-dir tmp/changed-items
          else
            for code in ${{ inputs.deck_codes }}; do
              lang="${code%%_*}"
              deck_dir="tmp/actions-data/${lang}/${code}"
              if [ ! -d "$deck_dir" ]; then
                case "$code" in
                  ja_*) deck_dir="tmp/actions-data/ja/${code}" ;;
                  zh_*) deck_dir="tmp/actions-data/zh/${code}" ;;
                  ko_*) deck_dir="tmp/actions-data/ko/${code}" ;;
                esac
              fi
              find "$deck_dir/items" -maxdepth 1 -type f -name '*.json' -printf 'items/%f\n' | sort > "tmp/changed-items/${code}.txt"
            done
          fi
      - name: Hydrate release media from VPS
        env:
          VPS_PACK_HOST: ${{ secrets.VPS_PACK_HOST }}
          VPS_PACK_PORT: ${{ secrets.VPS_PACK_PORT }}
          VPS_PACK_USER: ${{ secrets.VPS_PACK_USER }}
          VPS_PACK_SSH_KEY: ${{ secrets.VPS_PACK_SSH_KEY }}
          VPS_CANONICAL_MEDIA_ROOT: ${{ secrets.VPS_CANONICAL_MEDIA_ROOT }}
        run: |
          test -n "$VPS_PACK_HOST"
          test -n "$VPS_PACK_USER"
          test -n "$VPS_PACK_SSH_KEY"
          install -m 700 -d ~/.ssh
          python - ~/.ssh/vocomipedia_pack_deploy <<'PY'
          import base64
          import os
          import sys
          from pathlib import Path

          raw = os.environ["VPS_PACK_SSH_KEY"].strip()
          if "\\n" in raw and "\n" not in raw:
              raw = raw.replace("\\n", "\n")
          if not raw.startswith("-----BEGIN") and not raw.startswith("OPENSSH"):
              try:
                  raw = base64.b64decode(raw, validate=True).decode("utf-8").strip()
              except Exception:
                  pass
          Path(sys.argv[1]).write_text(raw + "\n", encoding="utf-8")
          Path(sys.argv[1]).chmod(0o600)
          PY
          chmod 600 ~/.ssh/vocomipedia_pack_deploy
          ssh-keygen -y -f ~/.ssh/vocomipedia_pack_deploy >/dev/null
          PORT="${VPS_PACK_PORT:-22}"
          REMOTE_ROOT="${VPS_CANONICAL_MEDIA_ROOT:-/srv/vocomipedia/data/languages}"
          cd vocomipedia
          python tools/sync_release_media_from_vps.py \
            --decks $SYNC_DECK_CODES \
            --root tmp/actions-data \
            --host "$VPS_PACK_HOST" \
            --port "$PORT" \
            --user "$VPS_PACK_USER" \
            --ssh-key ~/.ssh/vocomipedia_pack_deploy \
            --remote-root "$REMOTE_ROOT"
      - name: Validate release workspace
        run: |
          cd vocomipedia
          python tools/validate_corpus.py --root tmp/actions-data --strict-media --release-ready
      - name: Build release artifacts
        run: |
          cd vocomipedia
          for code in ${{ inputs.deck_codes }}; do
            lang="${code%%_*}"
            deck_dir="tmp/actions-data/${lang}/${code}"
            if [ ! -d "$deck_dir" ]; then
              case "$code" in
                ja_*) deck_dir="tmp/actions-data/ja/${code}" ;;
                zh_*) deck_dir="tmp/actions-data/zh/${code}" ;;
                ko_*) deck_dir="tmp/actions-data/ko/${code}" ;;
              esac
            fi
            python tools/release_pack.py \
              --deck-dir "$deck_dir" \
              --outdir release \
              --app-pubkey "${{ steps.private-key.outputs.public_path }}" \
              --validate-private-key "${{ steps.private-key.outputs.path }}"
          done
          python tools/release_combined_pack.py \
            --changed-decks ${{ inputs.deck_codes }} \
            --root tmp/actions-data \
            --catalog catalog/packs.yaml \
            --outdir release \
            --app-pubkey "${{ steps.private-key.outputs.public_path }}" \
            --validate-private-key "${{ steps.private-key.outputs.path }}"
      - name: Deploy pack artifacts to VPS
        env:
          VPS_PACK_HOST: ${{ secrets.VPS_PACK_HOST }}
          VPS_PACK_PORT: ${{ secrets.VPS_PACK_PORT }}
          VPS_PACK_USER: ${{ secrets.VPS_PACK_USER }}
          VPS_PACK_SSH_KEY: ${{ secrets.VPS_PACK_SSH_KEY }}
          VPS_PACK_ROOT: ${{ secrets.VPS_PACK_ROOT }}
        run: |
          test -n "$VPS_PACK_HOST"
          test -n "$VPS_PACK_USER"
          test -n "$VPS_PACK_SSH_KEY"
          install -m 700 -d ~/.ssh
          python - ~/.ssh/vocomipedia_pack_deploy <<'PY'
          import base64
          import os
          import sys
          from pathlib import Path

          raw = os.environ["VPS_PACK_SSH_KEY"].strip()
          if "\\n" in raw and "\n" not in raw:
              raw = raw.replace("\\n", "\n")
          if not raw.startswith("-----BEGIN") and not raw.startswith("OPENSSH"):
              try:
                  raw = base64.b64decode(raw, validate=True).decode("utf-8").strip()
              except Exception:
                  pass
          Path(sys.argv[1]).write_text(raw + "\n", encoding="utf-8")
          Path(sys.argv[1]).chmod(0o600)
          PY
          chmod 600 ~/.ssh/vocomipedia_pack_deploy
          ssh-keygen -y -f ~/.ssh/vocomipedia_pack_deploy >/dev/null
          PORT="${VPS_PACK_PORT:-22}"
          ROOT="${VPS_PACK_ROOT:-/srv/vocomi-packs}"
          cd vocomipedia
          python tools/deploy_packs_to_vps.py \
            --packs-dir release/packs \
            --release-name "${{ github.sha }}-${{ github.run_id }}" \
            --host "$VPS_PACK_HOST" \
            --port "$PORT" \
            --user "$VPS_PACK_USER" \
            --ssh-key ~/.ssh/vocomipedia_pack_deploy \
            --remote-root "$ROOT" \
            --source-sha "${{ github.sha }}" \
            --github-run-id "${{ github.run_id }}" \
            --updated-decks ${{ inputs.deck_codes }}
      - name: Push changed item pages to MediaWiki
        env:
          MEDIAWIKI_USERNAME: ${{ secrets.MEDIAWIKI_USERNAME }}
          MEDIAWIKI_PASSWORD: ${{ secrets.MEDIAWIKI_PASSWORD }}
          MEDIAWIKI_API_URL: ${{ secrets.MEDIAWIKI_API_URL }}
        run: |
          test -n "$MEDIAWIKI_USERNAME"
          test -n "$MEDIAWIKI_PASSWORD"
          test -n "$MEDIAWIKI_API_URL"
          cd vocomipedia
          for code in ${{ inputs.deck_codes }}; do
            lang="${code%%_*}"
            deck_dir="tmp/actions-data/${lang}/${code}"
            if [ ! -d "$deck_dir" ]; then
              case "$code" in
                ja_*) deck_dir="tmp/actions-data/ja/${code}" ;;
                zh_*) deck_dir="tmp/actions-data/zh/${code}" ;;
                ko_*) deck_dir="tmp/actions-data/ko/${code}" ;;
              esac
            fi
            changed_file="tmp/changed-items/${code}.txt"
            if [ ! -s "$changed_file" ]; then
              echo "No changed item pages for $code; skipping MediaWiki item push."
              continue
            fi
            python tools/sync_mediawiki.py push-api \
              --deck-dir "$deck_dir" \
              --api-url "$MEDIAWIKI_API_URL" \
              --approved-only \
              --changed-items-file "$changed_file" \
              --skip-if-no-changed-items \
              --skip-index-pages \
              --skip-admin-pages \
              --skip-structure-pages
          done
      - name: Reconcile MediaWiki entry images
        env:
          MEDIAWIKI_USERNAME: ${{ secrets.MEDIAWIKI_USERNAME }}
          MEDIAWIKI_PASSWORD: ${{ secrets.MEDIAWIKI_PASSWORD }}
          MEDIAWIKI_API_URL: ${{ secrets.MEDIAWIKI_API_URL }}
        run: |
          test -n "$MEDIAWIKI_USERNAME"
          test -n "$MEDIAWIKI_PASSWORD"
          test -n "$MEDIAWIKI_API_URL"
          cd vocomipedia
          for code in ${{ inputs.deck_codes }}; do
            lang="${code%%_*}"
            deck_dir="tmp/actions-data/${lang}/${code}"
            if [ ! -d "$deck_dir" ]; then
              case "$code" in
                ja_*) deck_dir="tmp/actions-data/ja/${code}" ;;
                zh_*) deck_dir="tmp/actions-data/zh/${code}" ;;
                ko_*) deck_dir="tmp/actions-data/ko/${code}" ;;
              esac
            fi
            python tools/sync_mediawiki.py sync-images-api \
              --deck-dir "$deck_dir" \
              --api-url "$MEDIAWIKI_API_URL" \
              --approved-only
          done
      - name: Generate search projection SQL
        run: |
          cd vocomipedia
          mkdir -p reports/search
          python tools/reindex_mediawiki_search.py \
            --root tmp/actions-data \
            --no-drop \
            --dry-run > reports/search/vocomipedia-search-upsert.sql
      - name: Rebuild remote search projection
        env:
          MEDIAWIKI_SSH_HOST: ${{ secrets.MEDIAWIKI_SSH_HOST }}
          MEDIAWIKI_SSH_PORT: ${{ secrets.MEDIAWIKI_SSH_PORT }}
          MEDIAWIKI_SSH_USER: ${{ secrets.MEDIAWIKI_SSH_USER }}
          MEDIAWIKI_SSH_PRIVATE_KEY: ${{ secrets.MEDIAWIKI_SSH_PRIVATE_KEY }}
          MEDIAWIKI_REMOTE_ROOT: ${{ secrets.MEDIAWIKI_REMOTE_ROOT }}
          MEDIAWIKI_DOCKER_COMPOSE: ${{ secrets.MEDIAWIKI_DOCKER_COMPOSE }}
        run: |
          test -n "$MEDIAWIKI_SSH_HOST"
          test -n "$MEDIAWIKI_SSH_USER"
          test -n "$MEDIAWIKI_SSH_PRIVATE_KEY"
          install -m 700 -d ~/.ssh
          python - ~/.ssh/vocomipedia_deploy <<'PY'
          import base64
          import os
          import sys
          from pathlib import Path

          raw = os.environ["MEDIAWIKI_SSH_PRIVATE_KEY"].strip()
          if "\\n" in raw and "\n" not in raw:
              raw = raw.replace("\\n", "\n")
          if not raw.startswith("-----BEGIN") and not raw.startswith("OPENSSH"):
              try:
                  raw = base64.b64decode(raw, validate=True).decode("utf-8").strip()
              except Exception:
                  pass
          Path(sys.argv[1]).write_text(raw + "\n", encoding="utf-8")
          Path(sys.argv[1]).chmod(0o600)
          PY
          chmod 600 ~/.ssh/vocomipedia_deploy
          ssh-keygen -y -f ~/.ssh/vocomipedia_deploy >/dev/null
          PORT="${MEDIAWIKI_SSH_PORT:-22}"
          REMOTE_ROOT="${MEDIAWIKI_REMOTE_ROOT:-/srv/vocomipedia}"
          REMOTE_COMPOSE="${MEDIAWIKI_DOCKER_COMPOSE:-docker-compose}"
          ssh-keyscan -p "$PORT" -H "$MEDIAWIKI_SSH_HOST" >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/vocomipedia_deploy -p "$PORT" "$MEDIAWIKI_SSH_USER@$MEDIAWIKI_SSH_HOST" \
            bash -s -- "$REMOTE_ROOT" "$REMOTE_COMPOSE" "${{ github.sha }}" <<'SH'
          set -Eeuo pipefail
          REMOTE_ROOT="$1"
          REMOTE_COMPOSE="$2"
          RELEASE_SHA="$3"

          echo "Using checkout: $REMOTE_ROOT"
          cd "$REMOTE_ROOT"
          git config --global --add safe.directory "$REMOTE_ROOT"
          git fetch --depth=2 origin main
          git reset --hard "$RELEASE_SHA"
          read -r -a COMPOSE_CMD <<< "$REMOTE_COMPOSE"
          "${COMPOSE_CMD[@]}" --env-file docker/local/.env -f docker/compose.local.yml ps
          VOCOMIPEDIA_DOCKER_COMPOSE="$REMOTE_COMPOSE" \
            python3 tools/reindex_mediawiki_search.py --root data/languages --no-drop
          SH
      - name: Upload release artifacts and reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vocomipedia-release
          path: |
            vocomipedia/release/**
            vocomipedia/reports/backups/*.tar.gz
            vocomipedia/reports/search/**
          if-no-files-found: ignore
