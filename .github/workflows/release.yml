name: Release And Deploy

on:
  workflow_dispatch:
    inputs:
      deck_codes:
        description: "Space-separated deck codes, e.g. zh_1 ja_n5 ja_n4"
        required: true
        default: "zh_1"
      source_ref:
        description: "Vocomi branch/ref to release from"
        required: false
        default: "main"
      sync_limit:
        description: "Limit entries per deck. Use 0 for full production decks."
        required: false
        default: "0"
      revise_japanese_furigana:
        description: "Revise Japanese ruby with SudachiPy/SudachiDict before release"
        type: boolean
        required: false
        default: false
      build_vpack:
        description: "Build .vpack artifacts"
        type: boolean
        required: false
        default: true
      upload:
        description: "Upload .vpack artifacts to Azure Blob Storage"
        type: boolean
        required: false
        default: false
      vps_pack_deploy:
        description: "Deploy built pack artifacts to the VPS static pack host"
        type: boolean
        required: false
        default: false
      mediawiki_push:
        description: "Push generated approved item pages to MediaWiki"
        type: boolean
        required: false
        default: false
      generate_search_sql:
        description: "Generate an upsert SQL artifact for VocomipediaSearch"
        type: boolean
        required: false
        default: true
      run_remote_reindex:
        description: "Run MEDIAWIKI_REINDEX_COMMAND over SSH after push"
        type: boolean
        required: false
        default: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - name: Checkout Vocomipedia
        uses: actions/checkout@v4
        with:
          path: vocomipedia
      - name: Checkout Vocomi source repo
        uses: actions/checkout@v4
        with:
          repository: dimitristaufer/Vocomi
          ref: ${{ inputs.source_ref }}
          token: ${{ secrets.VOCOMI_REPO_TOKEN }}
          path: vocomi
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: vocomipedia/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r vocomipedia/requirements.txt
      - name: Prepare private key
        id: private-key
        env:
          VOCOMI_IOS_PRIVATE_PEM: ${{ secrets.VOCOMI_IOS_PRIVATE_PEM }}
        run: |
          KEY_PATH="../vocomi/vocomi_pack_generation/ios_private.pem"
          if [ -n "$VOCOMI_IOS_PRIVATE_PEM" ]; then
            KEY_PATH="$RUNNER_TEMP/ios_private.pem"
            printf '%s\n' "$VOCOMI_IOS_PRIVATE_PEM" > "$KEY_PATH"
            chmod 600 "$KEY_PATH"
          fi
          echo "path=$KEY_PATH" >> "$GITHUB_OUTPUT"
      - name: Resolve deck closure
        run: |
          cd vocomipedia
          SYNC_DECK_CODES="$(python tools/catalog_decks.py --decks ${{ inputs.deck_codes }} --with-combined-siblings)"
          echo "SYNC_DECK_CODES=$SYNC_DECK_CODES" >> "$GITHUB_ENV"
      - name: Sync selected decks into canonical workspace
        run: |
          LIMIT_ARG=""
          if [ "${{ inputs.sync_limit }}" != "0" ]; then
            LIMIT_ARG="--limit ${{ inputs.sync_limit }}"
          fi
          SUDACHI_ARG=""
          if [ "${{ inputs.revise_japanese_furigana }}" = "true" ]; then
            SUDACHI_ARG="--revise-japanese-furigana --sudachi-dict core --sudachi-mode C"
          fi
          cd vocomipedia
          python tools/sync_all_packs.py \
            --decks $SYNC_DECK_CODES \
            $LIMIT_ARG \
            $SUDACHI_ARG \
            --copy-media \
            --mark-approved \
            --validate \
            --strict-media \
            --pack-generation-dir ../vocomi/vocomi_pack_generation \
            --out-root tmp/actions-data \
            --backup-dir reports/backups
      - name: Build and optionally upload release artifacts
        if: inputs.build_vpack || inputs.upload
        env:
          AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
          AZURE_STORAGE_KEY: ${{ secrets.AZURE_STORAGE_KEY }}
          PACKS_CONTAINER: ${{ secrets.PACKS_CONTAINER }}
        run: |
          UPLOAD_ARG=""
          if [ "${{ inputs.upload }}" = "true" ]; then
            test -n "$AZURE_STORAGE_ACCOUNT"
            test -n "$AZURE_STORAGE_KEY"
            UPLOAD_ARG="--upload"
          fi
          cd vocomipedia
          for code in ${{ inputs.deck_codes }}; do
            lang="${code%%_*}"
            deck_dir="tmp/actions-data/${lang}/${code}"
            if [ ! -d "$deck_dir" ]; then
              case "$code" in
                ja_*) deck_dir="tmp/actions-data/ja/${code}" ;;
                zh_*) deck_dir="tmp/actions-data/zh/${code}" ;;
                ko_*) deck_dir="tmp/actions-data/ko/${code}" ;;
              esac
            fi
            python tools/release_pack.py \
              --deck-dir "$deck_dir" \
              --pack-generation-dir ../vocomi/vocomi_pack_generation \
              --outdir release \
              --validate-private-key "${{ steps.private-key.outputs.path }}" \
              $UPLOAD_ARG
          done
          python tools/release_combined_pack.py \
            --changed-decks ${{ inputs.deck_codes }} \
            --root tmp/actions-data \
            --catalog catalog/packs.yaml \
            --pack-generation-dir ../vocomi/vocomi_pack_generation \
            --outdir release \
            --validate-private-key "${{ steps.private-key.outputs.path }}" \
            $UPLOAD_ARG
      - name: Deploy pack artifacts to VPS
        if: inputs.vps_pack_deploy
        env:
          VPS_PACK_HOST: ${{ secrets.VPS_PACK_HOST }}
          VPS_PACK_PORT: ${{ secrets.VPS_PACK_PORT }}
          VPS_PACK_USER: ${{ secrets.VPS_PACK_USER }}
          VPS_PACK_SSH_KEY: ${{ secrets.VPS_PACK_SSH_KEY }}
          VPS_PACK_ROOT: ${{ secrets.VPS_PACK_ROOT }}
        run: |
          test -n "$VPS_PACK_HOST"
          test -n "$VPS_PACK_USER"
          test -n "$VPS_PACK_SSH_KEY"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_PACK_SSH_KEY" > ~/.ssh/vocomipedia_pack_deploy
          chmod 600 ~/.ssh/vocomipedia_pack_deploy
          PORT="${VPS_PACK_PORT:-22}"
          ROOT="${VPS_PACK_ROOT:-/srv/vocomi-packs}"
          cd vocomipedia
          python tools/deploy_packs_to_vps.py \
            --packs-dir release/packs \
            --release-name "${{ github.sha }}-${{ github.run_id }}" \
            --host "$VPS_PACK_HOST" \
            --port "$PORT" \
            --user "$VPS_PACK_USER" \
            --ssh-key ~/.ssh/vocomipedia_pack_deploy \
            --remote-root "$ROOT"
      - name: Push selected decks to MediaWiki
        if: inputs.mediawiki_push
        env:
          MEDIAWIKI_USERNAME: ${{ secrets.MEDIAWIKI_USERNAME }}
          MEDIAWIKI_PASSWORD: ${{ secrets.MEDIAWIKI_PASSWORD }}
          MEDIAWIKI_API_URL: ${{ secrets.MEDIAWIKI_API_URL }}
        run: |
          test -n "$MEDIAWIKI_USERNAME"
          test -n "$MEDIAWIKI_PASSWORD"
          test -n "$MEDIAWIKI_API_URL"
          cd vocomipedia
          for code in ${{ inputs.deck_codes }}; do
            lang="${code%%_*}"
            deck_dir="tmp/actions-data/${lang}/${code}"
            if [ ! -d "$deck_dir" ]; then
              case "$code" in
                ja_*) deck_dir="tmp/actions-data/ja/${code}" ;;
                zh_*) deck_dir="tmp/actions-data/zh/${code}" ;;
                ko_*) deck_dir="tmp/actions-data/ko/${code}" ;;
              esac
            fi
            python tools/sync_mediawiki.py push-api \
              --deck-dir "$deck_dir" \
              --api-url "$MEDIAWIKI_API_URL" \
              --approved-only
          done
      - name: Generate search projection SQL
        if: inputs.generate_search_sql
        run: |
          cd vocomipedia
          mkdir -p reports/search
          python tools/reindex_mediawiki_search.py \
            --root tmp/actions-data \
            --no-drop \
            --dry-run > reports/search/vocomipedia-search-upsert.sql
      - name: Run remote search reindex command
        if: inputs.run_remote_reindex
        env:
          MEDIAWIKI_SSH_HOST: ${{ secrets.MEDIAWIKI_SSH_HOST }}
          MEDIAWIKI_SSH_USER: ${{ secrets.MEDIAWIKI_SSH_USER }}
          MEDIAWIKI_SSH_PRIVATE_KEY: ${{ secrets.MEDIAWIKI_SSH_PRIVATE_KEY }}
          MEDIAWIKI_REINDEX_COMMAND: ${{ secrets.MEDIAWIKI_REINDEX_COMMAND }}
        run: |
          test -n "$MEDIAWIKI_SSH_HOST"
          test -n "$MEDIAWIKI_SSH_USER"
          test -n "$MEDIAWIKI_SSH_PRIVATE_KEY"
          test -n "$MEDIAWIKI_REINDEX_COMMAND"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$MEDIAWIKI_SSH_PRIVATE_KEY" > ~/.ssh/vocomipedia_deploy
          chmod 600 ~/.ssh/vocomipedia_deploy
          ssh-keyscan -H "$MEDIAWIKI_SSH_HOST" >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/vocomipedia_deploy "$MEDIAWIKI_SSH_USER@$MEDIAWIKI_SSH_HOST" "$MEDIAWIKI_REINDEX_COMMAND"
      - name: Upload release artifacts and reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vocomipedia-release
          path: |
            vocomipedia/release/**
            vocomipedia/reports/backups/*.tar.gz
            vocomipedia/reports/search/**
          if-no-files-found: ignore
